name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret missing"; exit 1
          fi
          printf "%s" "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          {
            echo "storeFile=$RUNNER_TEMP/release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build signed release APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          GOOGLE_OAUTH_WEB_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_WEB_CLIENT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Rename APK
        id: rename
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          SRC=app/build/outputs/apk/release/app-release.apk
          DST="CallNest-${VERSION}.apk"
          cp "$SRC" "$DST"
          sha256sum "$DST" | cut -d' ' -f1 > "$DST.sha256"
          echo "apk=$DST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Call Nest ${{ steps.rename.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.rename.outputs.apk }}
            ${{ steps.rename.outputs.apk }}.sha256

      - name: Cleanup secrets
        if: always()
        run: rm -f keystore.properties "$RUNNER_TEMP/release.keystore"
